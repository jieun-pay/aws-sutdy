name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker 이미지 빌드
        run: docker build -t nextjs-app .

      - name: 이미지를 파일로 저장
        run: docker save nextjs-app | gzip > nextjs-app.tar.gz

      - name: EC2에 이미지 파일 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: nextjs-app.tar.gz
          target: /home/ubuntu/app/

      - name: EC2에서 컨테이너 실행
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/app
            docker load < nextjs-app.tar.gz
            docker stop nextjs-container || true
            docker rm nextjs-container || true
            docker run -d \
            --name nextjs-container \
            -p 3000:3000 \
            --restart always \
            nextjs-app:latest