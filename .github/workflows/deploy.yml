name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 프로젝트 압축
        run: tar -czf /tmp/app.tar.gz .

      - name: EC2에 압축 파일 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: /tmp/app.tar.gz
          target: /home/ubuntu/

      - name: EC2에서 압축 해제 후 실행
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            if ! command -v yarn &> /dev/null; then
              sudo npm install -g yarn
            fi
            cd /home/ubuntu
            tar -xzf tmp/app.tar.gz -C /home/ubuntu/app
            cd /home/ubuntu/app
            yarn install --frozen-lockfile
            yarn build
            pkill -f "yarn start" || true
            nohup yarn start > /home/ubuntu/app/app.log 2>&1 &